<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 96" role="img" aria-labelledby="title desc">
  <title id="title">GuardianLink</title>
  <desc id="desc">GuardianLink wordmark with a shield linking a learner to supporting adults.</desc>
  <defs>
    <linearGradient id="glwordmark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f7dd1"/>
      <stop offset="1" stop-color="#35a853"/>
    </linearGradient>
  </defs>
  <!-- Emblem -->
  <g transform="translate(10 10)">
    <path d="M38 0 70 12.5v21.8C70 55 57.7 71 38 78 18.3 71 6 55 6 34.3V12.5z" fill="url(#glwordmark)"/>
    <path d="M38 32 28 46M38 32 48 46" stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.85"/>
    <circle cx="38" cy="29" r="9" fill="#ffffff"/>
    <circle cx="28" cy="48" r="6.5" fill="#ffffff" opacity="0.95"/>
    <circle cx="48" cy="48" r="6.5" fill="#ffffff" opacity="0.95"/>
  </g>
  <!-- Wordmark -->
  <text x="98" y="46" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="31" font-weight="700" fill="#1f2937">Guardian<tspan fill="url(#glwordmark)">Link</tspan></text>
  <text x="100" y="69" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="12.5" letter-spacing="0.2" fill="#5b6470">Delegated family &amp; tutor engagement for Moodle</text>
</svg>
