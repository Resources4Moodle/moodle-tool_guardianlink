name: Moodle Plugin CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: 'postgres'
          POSTGRES_HOST_AUTH_METHOD: 'trust'
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_USER: 'root'
          MYSQL_ALLOW_EMPTY_PASSWORD: "true"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    strategy:
      fail-fast: false
      matrix:
        # GuardianLink targets the Moodle 5.2 series (requires 5.2). moodle-plugin-ci v4
        # needs PHP >= 8.3; Moodle 5.2 supports PHP 8.2-8.4, exercised here on 8.3 and 8.4.
        include:
          - php: '8.3'
            moodle-branch: 'MOODLE_502_STABLE'
            database: 'pgsql'
          - php: '8.3'
            moodle-branch: 'MOODLE_502_STABLE'
            database: 'mariadb'
          - php: '8.4'
            moodle-branch: 'MOODLE_502_STABLE'
            database: 'pgsql'
          - php: '8.4'
            moodle-branch: 'MOODLE_502_STABLE'
            database: 'mariadb'

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          # Explicit extension list (the matrix does not define `extensions`); covers both DB drivers.
          extensions: intl, zip, gd, soap, exif, pdo, pdo_pgsql, pgsql, mysqli, mbstring, xml, curl, sodium
          ini-values: max_input_vars=5000
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci/bin; pwd) >> "${GITHUB_PATH}"
          echo $(cd ci/vendor/bin; pwd) >> "${GITHUB_PATH}"
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> "${GITHUB_ENV}"

      - name: Install Moodle
        run: moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      # Quality steps run sequentially and stop the job at the first real failure, so the original
      # cause is obvious rather than buried under noisy secondary failures from a broken install.
      - name: phplint
        run: moodle-plugin-ci phplint
      - name: phpmd
        run: moodle-plugin-ci phpmd
      - name: phpcs
        run: moodle-plugin-ci phpcs --max-warnings 0
      - name: phpdoc
        run: moodle-plugin-ci phpdoc --max-warnings 0
      - name: validate
        run: moodle-plugin-ci validate
      - name: savepoints
        run: moodle-plugin-ci savepoints
      - name: mustache
        run: moodle-plugin-ci mustache
      - name: grunt
        run: moodle-plugin-ci grunt
      - name: phpunit
        run: moodle-plugin-ci phpunit --fail-on-warning
      - name: behat
        run: moodle-plugin-ci behat --profile chrome

      # Collect logs/dumps only when something failed, to help diagnose without hiding the first cause.
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-${{ matrix.database }}-php${{ matrix.php }}
          path: |
            moodledata/behat_dump/**
            moodle/behat_dump/**
          if-no-files-found: ignore
